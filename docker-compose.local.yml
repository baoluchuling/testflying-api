services:
  api:
    image: ${TESTFLYING_SERVER_IMAGE:-testflying-server:local}
    build: .
    ports:
      - "8000:8000"
    environment:
      TESTFLYING_DATABASE_URL: sqlite:////app/data/testflying.db
      TESTFLYING_PUBLIC_BASE_URL: http://localhost:8000
      TESTFLYING_STORAGE_BACKEND: local
      TESTFLYING_STORAGE_ROOT: /app/data/artifacts
      TESTFLYING_STATIC_TOKEN: dev-token
      TESTFLYING_ADMIN_USERNAME: admin
      TESTFLYING_CONNECTOR_BASE_URL_TEMPLATE: ${TESTFLYING_CONNECTOR_BASE_URL_TEMPLATE:-}
      TESTFLYING_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      TESTFLYING_TRANSLATION_PROVIDER: ${TESTFLYING_TRANSLATION_PROVIDER:-disabled}
      TESTFLYING_TRANSLATION_OPENAI_API_KEY: ${TESTFLYING_TRANSLATION_OPENAI_API_KEY:-}
      TESTFLYING_TRANSLATION_OPENAI_BASE_URL: ${TESTFLYING_TRANSLATION_OPENAI_BASE_URL:-https://api.openai.com/v1}
      TESTFLYING_TRANSLATION_OPENAI_MODEL: ${TESTFLYING_TRANSLATION_OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  connector:
    image: ${TESTFLYING_CONNECTOR_IMAGE:-testflying-connector:local}
    build: ./connector
    ports:
      - "8100:8100"
    mem_limit: ${TESTFLYING_CONNECTOR_MEMORY_LIMIT:-64m}
    environment:
      TESTFLYING_CONNECTOR_DEVELOPER_ACCOUNT_ID: ${TESTFLYING_CONNECTOR_DEVELOPER_ACCOUNT_ID:-account-apple-enterprise}
      TESTFLYING_CONNECTOR_TOKEN: ${TESTFLYING_CONNECTOR_TOKEN:-dev-connector-token}
      TESTFLYING_CONNECTOR_STORE_MODE: ${TESTFLYING_CONNECTOR_STORE_MODE:-mock}
      TESTFLYING_CONNECTOR_APPLE_ISSUER_ID: ${TESTFLYING_CONNECTOR_APPLE_ISSUER_ID:-}
      TESTFLYING_CONNECTOR_APPLE_KEY_ID: ${TESTFLYING_CONNECTOR_APPLE_KEY_ID:-}
      TESTFLYING_CONNECTOR_APPLE_PRIVATE_KEY_PATH: ${TESTFLYING_CONNECTOR_APPLE_PRIVATE_KEY_PATH:-}
      TESTFLYING_CONNECTOR_GOOGLE_SERVICE_ACCOUNT_JSON_PATH: ${TESTFLYING_CONNECTOR_GOOGLE_SERVICE_ACCOUNT_JSON_PATH:-}
      TESTFLYING_CONNECTOR_GOOGLE_DEVELOPER_ID: ${TESTFLYING_CONNECTOR_GOOGLE_DEVELOPER_ID:-}
    restart: unless-stopped
