name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: connector/go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          npm --prefix admin-web ci

      - name: Lint
        run: |
          ruff check src tests alembic
          npm --prefix admin-web run lint

      - name: Build Admin App
        run: |
          npm --prefix admin-web run build

      - name: Test
        run: |
          pytest -q
          (cd connector && go test ./...)
          npm --prefix admin-web test -- --run

      - name: Compile
        run: |
          python -m compileall -q src tests
          (cd connector && go build ./cmd/testflying-connector)
          (cd connector && CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o /tmp/testflying-connector.exe ./cmd/testflying-connector)

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.local.yml config

  package:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache-dependency-path: connector/go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Build Admin App
        run: |
          npm --prefix admin-web ci
          npm --prefix admin-web run build

      - name: Build Python wheels
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          mkdir -p dist/wheels
          python -m build --wheel --outdir dist/wheels .

      - name: Build Docker images
        run: |
          docker build -t testflying-server:${{ github.sha }} .
          docker build -t testflying-connector:${{ github.sha }} connector

      - name: Export Docker image artifacts
        run: |
          mkdir -p dist/images
          docker save testflying-server:${{ github.sha }} | gzip > dist/images/testflying-server-${{ github.sha }}.tar.gz
          docker save testflying-connector:${{ github.sha }} | gzip > dist/images/testflying-connector-${{ github.sha }}.tar.gz

      - name: Build connector binary artifacts
        run: |
          mkdir -p dist/connectors
          (
            cd connector
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o "../dist/connectors/testflying-connector-linux-amd64-${GITHUB_SHA}" ./cmd/testflying-connector
            CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o "../dist/connectors/testflying-connector-darwin-arm64-${GITHUB_SHA}" ./cmd/testflying-connector
            CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o "../dist/connectors/testflying-connector-darwin-amd64-${GITHUB_SHA}" ./cmd/testflying-connector
            CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o "../dist/connectors/testflying-connector-windows-amd64-${GITHUB_SHA}.exe" ./cmd/testflying-connector
          )
          (
            cd dist/connectors
            tar -czf "testflying-connector-linux-amd64-${GITHUB_SHA}.tar.gz" "testflying-connector-linux-amd64-${GITHUB_SHA}"
            tar -czf "testflying-connector-darwin-arm64-${GITHUB_SHA}.tar.gz" "testflying-connector-darwin-arm64-${GITHUB_SHA}"
            tar -czf "testflying-connector-darwin-amd64-${GITHUB_SHA}.tar.gz" "testflying-connector-darwin-amd64-${GITHUB_SHA}"
            python -m zipfile -c "testflying-connector-windows-amd64-${GITHUB_SHA}.zip" "testflying-connector-windows-amd64-${GITHUB_SHA}.exe"
            rm \
              "testflying-connector-linux-amd64-${GITHUB_SHA}" \
              "testflying-connector-darwin-arm64-${GITHUB_SHA}" \
              "testflying-connector-darwin-amd64-${GITHUB_SHA}" \
              "testflying-connector-windows-amd64-${GITHUB_SHA}.exe"
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testflying-build-${{ github.sha }}
          path: |
            dist/wheels/*.whl
            dist/images/*.tar.gz
            dist/connectors/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_SHA}"
          title="testflying build ${GITHUB_SHA}"
          notes="自动构建产物。Windows Connector 下载 testflying-connector-windows-amd64-${GITHUB_SHA}.zip；Docker 部署下载 testflying-connector-${GITHUB_SHA}.tar.gz。"
          assets=(
            "dist/connectors/testflying-connector-windows-amd64-${GITHUB_SHA}.zip"
            "dist/connectors/testflying-connector-linux-amd64-${GITHUB_SHA}.tar.gz"
            "dist/connectors/testflying-connector-darwin-arm64-${GITHUB_SHA}.tar.gz"
            "dist/connectors/testflying-connector-darwin-amd64-${GITHUB_SHA}.tar.gz"
            "dist/images/testflying-connector-${GITHUB_SHA}.tar.gz"
            "dist/images/testflying-server-${GITHUB_SHA}.tar.gz"
            "dist/wheels/testflying_server-0.1.0-py3-none-any.whl"
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes" \
              --latest
          fi
