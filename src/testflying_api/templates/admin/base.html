<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}testflying 管理后台{% endblock %}</title>
    <link rel="stylesheet" href="/static/admin/admin.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">TF</span>
        <div>
          <strong>testflying</strong>
          <small>管理后台</small>
        </div>
      </div>
      <nav class="nav">
        {% for key, href, label in nav_items %}
          <a class="nav-link {% if active == key %}is-active{% endif %}" href="{{ href }}">{{ label }}</a>
        {% endfor %}
      </nav>
    </aside>
    <main class="main" data-admin-main>
      <header class="topbar">
        <div>
          <p class="eyebrow">Internal Distribution</p>
          <h1>{% block heading %}testflying 管理后台{% endblock %}</h1>
        </div>
        <div class="health-check">
          <button class="ghost-button" type="button" data-health-check>服务健康</button>
          <span class="health-status" data-health-status data-state="idle">未检查</span>
        </div>
      </header>
      {% block content %}{% endblock %}
    </main>
    <div class="upload-dock" data-upload-dock hidden>
      <div class="upload-dock-main">
        <span data-upload-dock-status>等待上传</span>
        <strong data-upload-dock-percent>0%</strong>
      </div>
      <div class="upload-dock-track"><span data-upload-dock-bar></span></div>
      <button class="upload-dock-action" type="button" data-upload-result>查看上传</button>
    </div>
    <script>
      const adminUploadState = {
        status: 'idle',
        percent: 0,
        text: '等待上传',
        responseText: null
      };
      const healthStorageKey = 'testflying.admin.health';
      const adminHealthState = loadHealthState();

      function loadHealthState() {
        try {
          const raw = window.sessionStorage?.getItem(healthStorageKey);
          if (!raw) return { state: 'idle', text: '未检查' };
          const parsed = JSON.parse(raw);
          return {
            state: parsed.state || 'idle',
            text: parsed.text || '未检查'
          };
        } catch (error) {
          return { state: 'idle', text: '未检查' };
        }
      }

      function updateHealthState(state, text) {
        adminHealthState.state = state;
        adminHealthState.text = text;
        try {
          window.sessionStorage?.setItem(healthStorageKey, JSON.stringify(adminHealthState));
        } catch (error) {
          // Storage can be unavailable in private or constrained browser contexts.
        }
        syncHealthView();
      }

      function syncHealthView() {
        const status = document.querySelector('[data-health-status]');
        if (!status) return;
        status.dataset.state = adminHealthState.state;
        status.textContent = adminHealthState.text;
      }

      async function copyText(value) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
          return;
        }
        const textarea = document.createElement('textarea');
        textarea.value = value;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
      }

      function adminMain() {
        return document.querySelector('[data-admin-main]');
      }

      function adminPathFromUrl(url) {
        const parsed = new URL(url, window.location.origin);
        return `${parsed.pathname}${parsed.search}`;
      }

      function updateActiveNav(path) {
        document.querySelectorAll('.nav-link').forEach((link) => {
          link.classList.toggle('is-active', adminPathFromUrl(link.href) === path);
        });
      }

      function renderAdminHtml(html, path, shouldPushState = true) {
        const parser = new DOMParser();
        const nextDocument = parser.parseFromString(html, 'text/html');
        const nextMain = nextDocument.querySelector('[data-admin-main]');
        const currentMain = adminMain();
        if (!nextMain || !currentMain) {
          window.location.href = path;
          return;
        }
        currentMain.innerHTML = nextMain.innerHTML;
        document.title = nextDocument.title || document.title;
        updateActiveNav(path);
        if (shouldPushState && window.location.pathname !== path) {
          history.pushState({ adminPath: path }, '', path);
        }
        syncUploadViews();
        syncHealthView();
        syncAccountViews();
        syncMetadataEditor();
        window.scrollTo({ top: 0, behavior: 'auto' });
      }

      async function navigateAdmin(path, shouldPushState = true) {
        if (path === '/admin/uploads' && adminUploadState.responseText) {
          renderAdminHtml(adminUploadState.responseText, path, shouldPushState);
          return;
        }
        const response = await fetch(path, {
          headers: { Accept: 'text/html' },
          cache: 'no-store'
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        renderAdminHtml(await response.text(), path, shouldPushState);
      }

      function updateUploadState(status, percent, text) {
        adminUploadState.status = status;
        adminUploadState.percent = Math.max(0, Math.min(100, Math.round(percent)));
        adminUploadState.text = text;
        syncUploadViews();
      }

      function syncUploadViews() {
        const dock = document.querySelector('[data-upload-dock]');
        const dockStatus = document.querySelector('[data-upload-dock-status]');
        const dockPercent = document.querySelector('[data-upload-dock-percent]');
        const dockBar = document.querySelector('[data-upload-dock-bar]');
        const dockAction = document.querySelector('[data-upload-result]');
        const isActive = adminUploadState.status !== 'idle';

        if (dock) {
          dock.hidden = !isActive;
          dock.dataset.state = adminUploadState.status;
        }
        if (dockStatus) dockStatus.textContent = adminUploadState.text;
        if (dockPercent) dockPercent.textContent = `${adminUploadState.percent}%`;
        if (dockBar) dockBar.style.width = `${adminUploadState.percent}%`;
        if (dockAction) {
          dockAction.textContent = adminUploadState.status === 'done' ? '查看结果' : '查看上传';
        }

        const form = document.querySelector('[data-upload-form]');
        if (!form) return;
        const progress = form.querySelector('[data-upload-progress]');
        const status = form.querySelector('[data-upload-status]');
        const percent = form.querySelector('[data-upload-percent]');
        const bar = form.querySelector('[data-upload-bar]');
        const submit = form.querySelector('[data-upload-submit]');
        const isUploading = adminUploadState.status === 'uploading'
          || adminUploadState.status === 'processing';

        if (progress && isActive) progress.hidden = false;
        if (status && isActive) status.textContent = adminUploadState.text;
        if (percent && isActive) percent.textContent = `${adminUploadState.percent}%`;
        if (bar && isActive) bar.style.width = `${adminUploadState.percent}%`;
        form.dataset.uploading = isUploading ? 'true' : 'false';
        form.classList.toggle('is-uploading', isUploading);
        if (submit) {
          submit.disabled = isUploading;
          submit.toggleAttribute('aria-busy', isUploading);
          submit.textContent = isUploading ? '上传中' : '上传构建';
        }
      }

      function syncAccountStoreFields(root = document) {
        root.querySelectorAll('[data-account-app-bind-form]').forEach((form) => {
          const select = form.querySelector('select[name="appId"]');
          const fields = form.querySelectorAll('[data-store-field]');
          if (!select || fields.length === 0) return;
          const platform = select.selectedOptions[0]?.dataset.platform || 'ios';
          fields.forEach((field) => {
            const active = field.dataset.storeField === platform;
            field.hidden = !active;
            const input = field.querySelector('input');
            if (input && !active) input.value = '';
          });
        });
      }

      function selectAccountPreview(accountId) {
        document.querySelectorAll('[data-account-row]').forEach((row) => {
          row.classList.toggle('is-selected', row.dataset.accountId === accountId);
        });
        document.querySelectorAll('[data-account-preview]').forEach((preview) => {
          preview.hidden = preview.dataset.accountPreview !== accountId;
        });
      }

      function accountRowMatchesFilter(row, filter) {
        if (filter === 'ok') return row.dataset.accountStatus === 'ok';
        if (filter === 'renewal') return row.dataset.accountStatus !== 'ok';
        if (filter === 'connector') return row.dataset.accountConnector !== 'ok';
        return true;
      }

      function syncAccountMatrix() {
        const rows = Array.from(document.querySelectorAll('[data-account-row]'));
        if (rows.length === 0) return;
        const searchInput = document.querySelector('[data-account-search]');
        const activeFilter = document.querySelector('[data-account-filter].is-active');
        const query = (searchInput?.value || '').trim().toLowerCase();
        const filter = activeFilter?.dataset.accountFilter || 'all';
        let visibleCount = 0;
        let firstVisible = null;

        rows.forEach((row) => {
          const haystack = (row.dataset.accountSearch || '').toLowerCase();
          const visible = haystack.includes(query) && accountRowMatchesFilter(row, filter);
          row.hidden = !visible;
          if (visible) {
            visibleCount += 1;
            firstVisible ||= row;
          }
        });

        const resultCount = document.querySelector('[data-account-result-count]');
        if (resultCount) resultCount.textContent = String(visibleCount);

        const selected = rows.find((row) => row.classList.contains('is-selected') && !row.hidden);
        if (selected) {
          selectAccountPreview(selected.dataset.accountId);
        } else if (firstVisible) {
          selectAccountPreview(firstVisible.dataset.accountId);
        } else {
          document.querySelectorAll('[data-account-preview]').forEach((preview) => {
            preview.hidden = true;
          });
        }
      }

      function syncAccountViews() {
        syncAccountStoreFields();
        syncAccountMatrix();
      }

      function metadataInputs(form, locale, field) {
        if (!form) return [];
        return Array.from(form.querySelectorAll('[data-metadata-input]')).filter((input) => (
          input.dataset.locale === locale && input.dataset.field === field
        ));
      }

      function metadataValue(form, locale, field) {
        const input = metadataInputs(form, locale, field)[0];
        return input?.value || '';
      }

      function setMetadataValue(form, locale, field, value) {
        metadataInputs(form, locale, field).forEach((input) => {
          input.value = value;
        });
      }

      function storeImageInputs(form, locale, slot) {
        if (!form) return [];
        return Array.from(form.querySelectorAll('[data-store-image-input]')).filter((input) => (
          input.dataset.locale === locale && input.dataset.slot === slot
        ));
      }

      function storeImageValue(form, locale, slot) {
        const input = storeImageInputs(form, locale, slot)[0];
        return input?.value || '';
      }

      function setStoreImageValue(form, locale, slot, value) {
        storeImageInputs(form, locale, slot).forEach((input) => {
          input.value = value;
        });
      }

      function syncContentSetControls(form) {
        const picker = form?.querySelector('[data-content-set-picker]');
        const nameInput = form?.querySelector('[data-content-set-name]');
        const status = form?.querySelector('[data-content-set-status]');
        const selected = picker?.selectedOptions?.[0];
        if (!picker || !nameInput || !selected) return;
        const name = selected.dataset.name || selected.textContent.trim() || selected.value;
        nameInput.value = name;
        if (status) status.textContent = `已打开：${name}`;
      }

      function addContentSetOption(form, name, copyCurrent) {
        const picker = form?.querySelector('[data-content-set-picker]');
        if (!picker || !name) return;
        const id = `set-${Date.now()}`;
        const option = new Option(name, id, true, true);
        option.dataset.name = name;
        option.dataset.existing = 'false';
        picker.add(option);
        picker.value = id;
        syncContentSetControls(form);
        const status = form.querySelector('[data-content-set-status]');
        if (status) {
          status.textContent = `${copyCurrent ? '已复制为' : '新建'}：${name}，保存后生效`;
        }
      }

      function storeImageLocales(form) {
        return Array.from(new Set(
          Array.from(form.querySelectorAll('[name="locales"]'))
            .map((input) => input.value)
            .filter(Boolean)
        ));
      }

      function normalizeStoreImageToken(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, '').replace(/_/g, '-');
      }

      function detectStoreImageLocale(form, path, fallbackLocale) {
        const parts = path.split(/[\\/]/).map(normalizeStoreImageToken);
        const aliases = new Map([
          ['en', 'en-US'],
          ['en-us', 'en-US'],
          ['enus', 'en-US'],
          ['zh-hant', 'zh-Hant'],
          ['zhhant', 'zh-Hant'],
          ['zh-tw', 'zh-Hant'],
          ['zhtw', 'zh-Hant'],
          ['zh-hans', 'zh-Hans'],
          ['zhhans', 'zh-Hans'],
          ['zh-cn', 'zh-Hans'],
          ['zhcn', 'zh-Hans'],
          ['ja', 'ja'],
          ['jp', 'ja'],
          ['ko', 'ko'],
          ['fr', 'fr-FR'],
          ['fr-fr', 'fr-FR'],
          ['frfr', 'fr-FR'],
        ]);
        const supported = new Set(storeImageLocales(form));
        for (const part of parts) {
          const locale = aliases.get(part) || part;
          if (supported.has(locale)) return locale;
        }
        return fallbackLocale || form.dataset.sourceLocale;
      }

      function detectStoreImageSlot(path, fallbackSlot) {
        const value = normalizeStoreImageToken(path);
        if (/(app-icon|appicon|icon|logo|图标)/.test(value)) return 'app_icon_url';
        if (/(feature|promo|banner|marketing|hero|宣传|横图)/.test(value)) return 'feature_graphic_url';
        if (/(tablet|ipad|平板)/.test(value)) return 'tablet_screenshots';
        if (/(phone|screenshot|screen|iphone|android|截图|手机)/.test(value)) return 'phone_screenshots';
        return fallbackSlot || '';
      }

      function storeImageFileRecords(files) {
        return Array.from(files || []).map((file) => ({
          file,
          path: file.webkitRelativePath || file.name,
        }));
      }

      async function storeImageRecordsFromDrop(dataTransfer) {
        const entries = Array.from(dataTransfer.items || [])
          .map((item) => item.webkitGetAsEntry ? item.webkitGetAsEntry() : null)
          .filter(Boolean);
        if (!entries.length) return storeImageFileRecords(dataTransfer.files);
        const nested = await Promise.all(entries.map((entry) => readStoreImageEntry(entry, '')));
        return nested.flat();
      }

      function readStoreImageEntry(entry, parentPath) {
        const path = parentPath ? `${parentPath}/${entry.name}` : entry.name;
        if (entry.isFile) {
          return new Promise((resolve) => {
            entry.file((file) => resolve([{ file, path }]));
          });
        }
        if (!entry.isDirectory) return Promise.resolve([]);
        const reader = entry.createReader();
        const records = [];
        return new Promise((resolve) => {
          const readBatch = () => {
            reader.readEntries(async (entries) => {
              if (!entries.length) {
                resolve(records);
                return;
              }
              const nested = await Promise.all(entries.map((child) => readStoreImageEntry(child, path)));
              records.push(...nested.flat());
              readBatch();
            });
          };
          readBatch();
        });
      }

      function isStoreImageFile(file) {
        return file?.type?.startsWith('image/') || /\.(png|jpe?g|webp)$/i.test(file?.name || '');
      }

      function applyStoreImageRecords(form, records, fallbackSlot, fallbackLocale) {
        const groups = new Map();
        let skipped = 0;
        records.forEach((record) => {
          if (!isStoreImageFile(record.file)) {
            skipped += 1;
            return;
          }
          const locale = detectStoreImageLocale(form, record.path, fallbackLocale);
          const slot = detectStoreImageSlot(record.path, fallbackSlot);
          if (!locale || !slot) {
            skipped += 1;
            return;
          }
          const key = `${slot}__${locale}`;
          if (!groups.has(key)) groups.set(key, { slot, locale, files: [] });
          groups.get(key).files.push(record.file);
        });
        groups.forEach(({ slot, locale, files }) => {
          const input = form.querySelector(`[data-store-image-file][data-slot="${slot}"][data-locale="${locale}"]:not(:disabled)`);
          if (!input) return;
          const zone = input.closest('[data-store-image-zone]');
          const multiple = zone?.dataset.multiple === 'true';
          const sorted = files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
          setStoreImageFiles(input, multiple ? sorted : sorted.slice(-1));
          renderStoreImagePreview(input);
        });
        const status = form.querySelector('[data-store-image-bulk-status]');
        if (status) {
          const count = Array.from(groups.values()).reduce((sum, group) => sum + group.files.length, 0);
          status.textContent = `已归类 ${count} 张图片${skipped ? `，${skipped} 个文件未识别` : ''}`;
        }
      }

      function setStoreImageFiles(input, files) {
        const transfer = new DataTransfer();
        files.forEach((file) => transfer.items.add(file));
        input.files = transfer.files;
      }

      function renderStoreImagePreview(input) {
        const zone = input.closest('[data-store-image-zone]');
        const wrapper = zone?.parentElement;
        const preview = wrapper?.querySelector('[data-store-image-preview]');
        const fileList = zone?.querySelector('[data-store-image-file-list]');
        const files = Array.from(input.files || []);
        zone?.classList.toggle('has-files', files.length > 0);
        if (fileList) {
          fileList.textContent = files.length
            ? files.map((file) => file.name).join(', ')
            : '暂无本地图片，可拖拽图片或语言文件夹';
        }
        if (!preview || !files.length) return;
        preview.innerHTML = files.map((file) => (
          `<img alt="${file.name}" src="${URL.createObjectURL(file)}">`
        )).join('');
      }

      function syncCollapsibleLocaleGroups(form, activeLocale) {
        form.querySelectorAll('[data-locale-group]').forEach((group) => {
          const expanded = group.dataset.expanded === 'true';
          group.classList.toggle('is-expanded', expanded);
          group.querySelectorAll('[data-current-locale-label]').forEach((label) => {
            label.textContent = activeLocale;
          });
          group.querySelectorAll('[data-locale-row]').forEach((row) => {
            row.hidden = !expanded && row.dataset.locale !== activeLocale;
          });
          const toggle = group.querySelector('[data-locale-group-toggle]');
          if (toggle) {
            toggle.textContent = expanded ? '收起多语言' : '展开多语言';
            toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
          }
        });
      }

      function syncVisibleRequiredFields(form) {
        form.querySelectorAll('[data-required-field="true"]').forEach((input) => {
          input.required = !input.disabled && !input.closest('[hidden]');
        });
      }

      function syncMetadataEditor(root = document) {
        root.querySelectorAll('[data-metadata-form]').forEach((form) => {
          const fieldView = form.querySelector('[data-field-view]');
          const picker = form.querySelector('[data-language-picker]');
          const activeLocale = picker?.value || form.dataset.sourceLocale;

          form.querySelector('[data-metadata-editor]')?.setAttribute('data-mode', 'field');
          if (fieldView) fieldView.hidden = false;
          syncCollapsibleLocaleGroups(form, activeLocale);

          fieldView?.querySelectorAll('input, textarea, select').forEach((input) => {
            input.disabled = false;
          });
          syncVisibleRequiredFields(form);
          syncContentSetControls(form);
        });
      }

      function startAdminUpload(form) {
        if (adminUploadState.status === 'uploading' || adminUploadState.status === 'processing') {
          return;
        }

        adminUploadState.responseText = null;
        const request = new XMLHttpRequest();
        request.open('POST', form.action);
        request.upload.addEventListener('progress', (progressEvent) => {
          if (!progressEvent.lengthComputable) {
            updateUploadState('uploading', adminUploadState.percent, '正在上传');
            return;
          }
          updateUploadState(
            'uploading',
            (progressEvent.loaded / progressEvent.total) * 100,
            '正在上传'
          );
        });
        request.upload.addEventListener('load', () => {
          updateUploadState('processing', 100, '正在处理');
        });
        request.addEventListener('load', () => {
          adminUploadState.responseText = request.responseText;
          updateUploadState(
            request.status >= 200 && request.status < 300 ? 'done' : 'error',
            100,
            request.status >= 200 && request.status < 300 ? '上传完成' : '上传失败'
          );
          if (window.location.pathname === '/admin/uploads') {
            renderAdminHtml(request.responseText, '/admin/uploads', false);
          }
        });
        request.addEventListener('error', () => {
          updateUploadState('error', 0, '上传失败');
        });
        updateUploadState('uploading', 0, '准备上传');
        request.send(new FormData(form));
      }

      function setSubmitterBusy(submitter, busyText = '处理中') {
        if (!submitter) return;
        submitter.dataset.originalText ||= submitter.textContent;
        submitter.disabled = true;
        submitter.setAttribute('aria-busy', 'true');
        submitter.textContent = busyText;
      }

      function setLinkBusy(link) {
        if (!link) return;
        link.setAttribute('aria-busy', 'true');
      }

      document.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-copy]');
        if (!button) return;
        await copyText(button.dataset.copy);
        const previous = button.textContent;
        button.textContent = '已复制';
        setTimeout(() => { button.textContent = previous; }, 1200);
      });

      document.addEventListener('input', (event) => {
        if (event.target.closest('[data-account-search]')) {
          syncAccountMatrix();
        }
        const metadataInput = event.target.closest('[data-metadata-input]');
        if (metadataInput) {
          const form = metadataInput.closest('[data-metadata-form]');
          setMetadataValue(
            form,
            metadataInput.dataset.locale,
            metadataInput.dataset.field,
            metadataInput.value
          );
        }
        const storeImageInput = event.target.closest('[data-store-image-input]');
        if (storeImageInput) {
          const form = storeImageInput.closest('[data-metadata-form]');
          setStoreImageValue(
            form,
            storeImageInput.dataset.locale,
            storeImageInput.dataset.slot,
            storeImageInput.value
          );
        }
      });

      document.addEventListener('change', (event) => {
        if (event.target.closest('[data-account-app-bind-form] select[name="appId"]')) {
          syncAccountStoreFields();
        }
        if (event.target.closest('[data-language-picker]')) {
          syncMetadataEditor();
        }
        const contentSetPicker = event.target.closest('[data-content-set-picker]');
        if (contentSetPicker) {
          const form = contentSetPicker.closest('[data-metadata-form]');
          syncContentSetControls(form);
          const selected = contentSetPicker.selectedOptions?.[0];
          if (selected?.dataset.existing === 'true') {
            const url = new URL(window.location.href);
            url.searchParams.set('content_set_id', contentSetPicker.value);
            const version = form?.querySelector('[name="version"]')?.value;
            const locale = form?.querySelector('[name="locale"]')?.value;
            if (version) url.searchParams.set('version', version);
            if (locale) url.searchParams.set('locale', locale);
            window.location.href = url.toString();
          }
        }
        const storeImageFile = event.target.closest('[data-store-image-file]');
        if (storeImageFile) {
          renderStoreImagePreview(storeImageFile);
        }
        const bulkFiles = event.target.closest('[data-store-image-bulk-files], [data-store-image-folder]');
        if (bulkFiles) {
          const form = bulkFiles.closest('[data-metadata-form]');
          applyStoreImageRecords(form, storeImageFileRecords(bulkFiles.files), '', '');
          bulkFiles.value = '';
        }
      });

      document.addEventListener('click', (event) => {
        const connectorEdit = event.target.closest('[data-connector-edit]');
        if (connectorEdit) {
          const panel = connectorEdit.closest('[data-admin-main]');
          const form = panel?.querySelector('[data-connector-form]');
          if (form) {
            form.hidden = false;
            connectorEdit.hidden = true;
            form.querySelector('input, select, textarea')?.focus();
          }
          return;
        }

        const selector = event.target.closest('[data-account-select]');
        if (selector) {
          selectAccountPreview(selector.dataset.accountSelect);
          return;
        }

        const filter = event.target.closest('[data-account-filter]');
        if (filter) {
          document.querySelectorAll('[data-account-filter]').forEach((item) => {
            item.classList.toggle('is-active', item === filter);
          });
          syncAccountMatrix();
          return;
        }

        const localeToggle = event.target.closest('[data-locale-group-toggle]');
        if (localeToggle) {
          const group = localeToggle.closest('[data-locale-group]');
          if (group) {
            group.dataset.expanded = group.dataset.expanded === 'true' ? 'false' : 'true';
            syncMetadataEditor();
          }
          return;
        }

        const translateButton = event.target.closest('[data-translate-metadata]');
        if (translateButton) {
          const form = translateButton.closest('[data-metadata-form]');
          const sourceLocale = form?.dataset.sourceLocale;
          if (!form || !sourceLocale) return;
          const fields = Array.from(new Set(
            Array.from(form.querySelectorAll('[data-metadata-input]')).map((input) => input.dataset.field)
          ));
          const locales = Array.from(new Set(
            Array.from(form.querySelectorAll('[name="locales"]')).map((input) => input.value).filter(Boolean)
          ));
          locales.filter((locale) => locale !== sourceLocale).forEach((locale) => {
            fields.forEach((field) => {
              if (!metadataValue(form, locale, field).trim()) {
                setMetadataValue(form, locale, field, metadataValue(form, sourceLocale, field));
              }
            });
          });
          const imageSlots = Array.from(new Set(
            Array.from(form.querySelectorAll('[data-store-image-input]')).map((input) => input.dataset.slot)
          ));
          locales.filter((locale) => locale !== sourceLocale).forEach((locale) => {
            imageSlots.forEach((slot) => {
              if (!storeImageValue(form, locale, slot).trim()) {
                setStoreImageValue(form, locale, slot, storeImageValue(form, sourceLocale, slot));
              }
            });
          });
          const previous = translateButton.textContent;
          translateButton.textContent = '已填充空白语言';
          setTimeout(() => { translateButton.textContent = previous; }, 1400);
          syncMetadataEditor();
          return;
        }

        const createSet = event.target.closest('[data-create-content-set]');
        if (createSet) {
          const form = createSet.closest('[data-metadata-form]');
          const name = window.prompt('新套件名称', '新的商店内容套件');
          addContentSetOption(form, name?.trim(), false);
          return;
        }

        const duplicateSet = event.target.closest('[data-duplicate-content-set]');
        if (duplicateSet) {
          const form = duplicateSet.closest('[data-metadata-form]');
          const currentName = form?.querySelector('[data-content-set-name]')?.value || '当前套件';
          const name = window.prompt('复制后的套件名称', `${currentName} 副本`);
          addContentSetOption(form, name?.trim(), true);
          return;
        }

        const folderButton = event.target.closest('[data-store-image-folder-button]');
        if (folderButton) {
          folderButton.closest('[data-store-image-bulk-drop]')?.querySelector('[data-store-image-folder]')?.click();
          return;
        }

        const filesButton = event.target.closest('[data-store-image-files-button]');
        if (filesButton) {
          filesButton.closest('[data-store-image-bulk-drop]')?.querySelector('[data-store-image-bulk-files]')?.click();
          return;
        }

        const imageZone = event.target.closest('[data-store-image-zone]');
        if (imageZone && !event.target.closest('input')) {
          imageZone.querySelector('[data-store-image-file]')?.click();
          return;
        }

        const row = event.target.closest('[data-account-row]');
        if (!row || event.target.closest('a, button, form, input, select, textarea')) return;
        selectAccountPreview(row.dataset.accountId);
      });

      document.addEventListener('dragenter', (event) => {
        const target = event.target.closest('[data-store-image-zone], [data-store-image-bulk-drop]');
        if (!target) return;
        event.preventDefault();
        target.classList.add('is-dragover');
      });

      document.addEventListener('dragover', (event) => {
        const target = event.target.closest('[data-store-image-zone], [data-store-image-bulk-drop]');
        if (!target) return;
        event.preventDefault();
        target.classList.add('is-dragover');
      });

      document.addEventListener('dragleave', (event) => {
        const target = event.target.closest('[data-store-image-zone], [data-store-image-bulk-drop]');
        if (!target) return;
        target.classList.remove('is-dragover');
      });

      document.addEventListener('drop', async (event) => {
        const target = event.target.closest('[data-store-image-zone], [data-store-image-bulk-drop]');
        if (!target) return;
        event.preventDefault();
        target.classList.remove('is-dragover');
        const form = target.closest('[data-metadata-form]');
        const records = await storeImageRecordsFromDrop(event.dataTransfer);
        applyStoreImageRecords(
          form,
          records,
          target.dataset.slot || '',
          target.dataset.locale || ''
        );
      });

      document.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-health-check]');
        if (!button) return;
        const previous = button.textContent;
        button.disabled = true;
        button.textContent = '检查中';
        updateHealthState('checking', '检查中');
        try {
          const response = await fetch('/health', {
            headers: { Accept: 'application/json' },
            cache: 'no-store'
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          if (payload.status !== 'ok') throw new Error('Health status is not ok');
          updateHealthState('ok', '正常');
        } catch (error) {
          updateHealthState('error', '异常');
        } finally {
          button.disabled = false;
          button.textContent = previous;
        }
      });

      document.addEventListener('click', async (event) => {
        const action = event.target.closest('[data-upload-result]');
        if (!action) return;
        event.preventDefault();
        await navigateAdmin('/admin/uploads');
      });

      document.addEventListener('click', async (event) => {
        const link = event.target.closest('a[href^="/admin"]');
        if (!link || link.target || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
          return;
        }
        event.preventDefault();
        setLinkBusy(link);
        try {
          await navigateAdmin(adminPathFromUrl(link.href));
        } catch (error) {
          window.location.href = link.href;
        }
      });

      document.addEventListener('submit', (event) => {
        const form = event.target.closest('[data-upload-form]');
        if (!form || !window.FormData || !window.XMLHttpRequest) return;
        event.preventDefault();
        startAdminUpload(form);
      });

      document.addEventListener('submit', (event) => {
        const form = event.target.closest('form');
        if (!form || form.matches('[data-upload-form]')) return;
        setSubmitterBusy(event.submitter);
      });

      window.addEventListener('popstate', async () => {
        try {
          await navigateAdmin(window.location.pathname, false);
        } catch (error) {
          window.location.reload();
        }
      });

      window.addEventListener('beforeunload', (event) => {
        if (adminUploadState.status !== 'uploading' && adminUploadState.status !== 'processing') {
          return;
        }
        event.preventDefault();
        event.returnValue = '';
      });

      syncHealthView();
      syncAccountViews();
      syncMetadataEditor();
    </script>
  </body>
</html>
