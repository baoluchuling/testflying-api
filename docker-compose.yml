services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      TESTFLYING_DATABASE_URL: postgresql+psycopg://testflying:testflying@postgres:5432/testflying
      TESTFLYING_PUBLIC_BASE_URL: ${TESTFLYING_PUBLIC_BASE_URL:-http://47.90.163.122:8000}
      TESTFLYING_STORAGE_BACKEND: s3
      TESTFLYING_STORAGE_ROOT: /app/data/artifacts
      TESTFLYING_S3_ENDPOINT_URL: http://minio:9000
      TESTFLYING_S3_PUBLIC_BASE_URL: ${TESTFLYING_S3_PUBLIC_BASE_URL:-http://47.90.163.122:9000/testflying}
      TESTFLYING_S3_BUCKET: testflying
      TESTFLYING_S3_ACCESS_KEY_ID: testflying
      TESTFLYING_S3_SECRET_ACCESS_KEY: testflying-secret
      TESTFLYING_STATIC_TOKEN: dev-token
      TESTFLYING_ADMIN_USERNAME: admin
      TESTFLYING_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  connector:
    build: ./connector
    ports:
      - "8100:8100"
    environment:
      TESTFLYING_CONNECTOR_DEVELOPER_ACCOUNT_ID: account-apple-enterprise
      TESTFLYING_CONNECTOR_TOKEN: dev-connector-token
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testflying
      POSTGRES_USER: testflying
      POSTGRES_PASSWORD: testflying
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testflying -d testflying"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: testflying
      MINIO_ROOT_PASSWORD: testflying-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 testflying testflying-secret; do sleep 2; done &&
      mc mb -p local/testflying || true
      "
    restart: "no"

volumes:
  postgres-data:
  minio-data:
