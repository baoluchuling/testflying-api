name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e "connector[dev]"

      - name: Lint
        run: ruff check src tests alembic connector/src connector/tests

      - name: Test
        run: |
          pytest -q
          pytest -q connector/tests

      - name: Compile
        run: python -m compileall -q src tests connector/src connector/tests

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.local.yml config

  package:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build Python wheels
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          mkdir -p dist/wheels
          python -m build --wheel --outdir dist/wheels .
          python -m build --wheel --outdir dist/wheels connector

      - name: Build Docker images
        run: |
          docker build -t testflying-server:${{ github.sha }} .
          docker build -t testflying-connector:${{ github.sha }} connector

      - name: Export Docker image artifacts
        run: |
          mkdir -p dist/images
          docker save testflying-server:${{ github.sha }} | gzip > dist/images/testflying-server-${{ github.sha }}.tar.gz
          docker save testflying-connector:${{ github.sha }} | gzip > dist/images/testflying-connector-${{ github.sha }}.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testflying-build-${{ github.sha }}
          path: |
            dist/wheels/*.whl
            dist/images/*.tar.gz
          if-no-files-found: error
