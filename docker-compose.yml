services:
  api:
    image: ${TESTFLYING_SERVER_IMAGE:-testflying-server:latest}
    build: .
    ports:
      - "8000:8000"
    environment:
      TESTFLYING_DATABASE_URL: postgresql+psycopg://testflying:testflying@postgres:5432/testflying
      TESTFLYING_PUBLIC_BASE_URL: ${TESTFLYING_PUBLIC_BASE_URL:-http://47.90.163.122:8000}
      TESTFLYING_STORAGE_BACKEND: s3
      TESTFLYING_STORAGE_ROOT: /app/data/artifacts
      TESTFLYING_S3_ENDPOINT_URL: http://minio:9000
      TESTFLYING_S3_PUBLIC_BASE_URL: ${TESTFLYING_S3_PUBLIC_BASE_URL:-http://47.90.163.122:9000/testflying}
      TESTFLYING_S3_BUCKET: testflying
      TESTFLYING_S3_ACCESS_KEY_ID: testflying
      TESTFLYING_S3_SECRET_ACCESS_KEY: testflying-secret
      TESTFLYING_STATIC_TOKEN: dev-token
      TESTFLYING_ADMIN_USERNAME: admin
      TESTFLYING_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      TESTFLYING_CONNECTOR_BASE_URL_TEMPLATE: ${TESTFLYING_CONNECTOR_BASE_URL_TEMPLATE:-}
      TESTFLYING_TRANSLATION_PROVIDER: ${TESTFLYING_TRANSLATION_PROVIDER:-disabled}
      TESTFLYING_TRANSLATION_OPENAI_API_KEY: ${TESTFLYING_TRANSLATION_OPENAI_API_KEY:-}
      TESTFLYING_TRANSLATION_OPENAI_BASE_URL: ${TESTFLYING_TRANSLATION_OPENAI_BASE_URL:-https://api.openai.com/v1}
      TESTFLYING_TRANSLATION_OPENAI_MODEL: ${TESTFLYING_TRANSLATION_OPENAI_MODEL:-gpt-4o-mini}
      TESTFLYING_DINGTALK_WEBHOOK_URL: ${TESTFLYING_DINGTALK_WEBHOOK_URL:-}
      TESTFLYING_DINGTALK_SECRET: ${TESTFLYING_DINGTALK_SECRET:-}
      TESTFLYING_DINGTALK_TIMEOUT_SECONDS: ${TESTFLYING_DINGTALK_TIMEOUT_SECONDS:-5}
      TESTFLYING_DINGTALK_DISPATCH_INTERVAL_SECONDS: ${TESTFLYING_DINGTALK_DISPATCH_INTERVAL_SECONDS:-10}
      TESTFLYING_RUNNER_RELEASE_ROOT: /app/data/runner-releases
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  connector:
    image: ${TESTFLYING_CONNECTOR_IMAGE:-testflying-connector:latest}
    build: ./connector
    ports:
      - "8100:8100"
    mem_limit: ${TESTFLYING_CONNECTOR_MEMORY_LIMIT:-64m}
    environment:
      TESTFLYING_CONNECTOR_DEVELOPER_ACCOUNT_ID: ${TESTFLYING_CONNECTOR_DEVELOPER_ACCOUNT_ID:-account-apple-enterprise}
      TESTFLYING_CONNECTOR_TOKEN: ${TESTFLYING_CONNECTOR_TOKEN:-dev-connector-token}
      TESTFLYING_CONNECTOR_STORE_MODE: ${TESTFLYING_CONNECTOR_STORE_MODE:-mock}
      TESTFLYING_CONNECTOR_APPLE_ISSUER_ID: ${TESTFLYING_CONNECTOR_APPLE_ISSUER_ID:-}
      TESTFLYING_CONNECTOR_APPLE_KEY_ID: ${TESTFLYING_CONNECTOR_APPLE_KEY_ID:-}
      TESTFLYING_CONNECTOR_APPLE_PRIVATE_KEY_PATH: ${TESTFLYING_CONNECTOR_APPLE_PRIVATE_KEY_PATH:-}
      TESTFLYING_CONNECTOR_GOOGLE_SERVICE_ACCOUNT_JSON_PATH: ${TESTFLYING_CONNECTOR_GOOGLE_SERVICE_ACCOUNT_JSON_PATH:-}
      TESTFLYING_CONNECTOR_GOOGLE_DEVELOPER_ID: ${TESTFLYING_CONNECTOR_GOOGLE_DEVELOPER_ID:-}
    networks:
      default:
        aliases:
          - connector-${TESTFLYING_CONNECTOR_DEVELOPER_ACCOUNT_ID:-account-apple-enterprise}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testflying
      POSTGRES_USER: testflying
      POSTGRES_PASSWORD: testflying
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testflying -d testflying"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: testflying
      MINIO_ROOT_PASSWORD: testflying-secret
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 testflying testflying-secret; do sleep 2; done &&
      mc mb -p local/testflying || true
      "
    restart: "no"

volumes:
  postgres-data:
  minio-data:
